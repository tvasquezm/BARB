version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: barb_postgres_db
    environment:
      POSTGRES_USER: barb_admin
      POSTGRES_PASSWORD: barb_password123
      POSTGRES_DB: barb_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ESTA LÍNEA ES LA MAGIA PARA QUE SE AUTOCREEN LAS TABLAS:
      - ./initdb:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: barb_backend_api
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://barb_admin:barb_password123@db:5432/barb_database
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
    # ESTO HACE QUE EL ENTORNO SEA PORTÁTIL PARA TU CLIENTE:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/dockerfile
    container_name: barb_main_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: